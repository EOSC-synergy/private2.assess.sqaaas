        - /usr/bin/env sh .sqa/script.flamingo_unique_finch.sh
        container: qc.doc_tangerine_philosophical_phoenix
      github.com/PalomoIFCA/private2 git:
        commands:
        - /usr/bin/env sh .sqa/script.gunmetal_content_finch.sh
        container: qc.doc_wave_spontaneous_wildcat
      github.com/PalomoIFCA/private2 markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.flax_amused_raven.sh
        container: qc.doc_espresso_observant_axolotl
  QC.Lic:
