config:
  credentials:
  - id: https://github.com/PalomoIFCA/private2
    password_var: GIT_PASSWORD
    username_var: GIT_USER
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: fix/updatego
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/private2:
      branch: main
      credential_tmp: true
      credentials_id: https://github.com/PalomoIFCA/private2
      repo: https://github.com/PalomoIFCA/private2
